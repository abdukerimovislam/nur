name: nur_ramadan
description: Prayer, Quran AI, widgets, and daily Muslim companion.
publish_to: 'none'
version: 1.0.0+13

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core
  provider: ^6.1.1
  shared_preferences: ^2.5.4
  intl: ^0.20.2

  # Features
  adhan: ^2.0.0
  geolocator: ^11.0.0
  permission_handler: ^12.0.1
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0
  sensors_plus: ^6.1.2   # Для сенсоров компаса
  table_calendar: ^3.2.0
  geocoding: ^4.0.0
  hijri: ^3.0.0
  camera: ^0.11.3+1
  flutter_compass: ^0.8.1
  share_plus: ^12.0.1
  path_provider: ^2.1.5
  vibration: ^3.1.6
  firebase_core: ^4.4.0
  firebase_analytics: ^12.1.2
  firebase_crashlytics: ^5.0.7
  google_mobile_ads: ^7.0.0
  app_tracking_transparency: ^2.0.6+1
  url_launcher: ^6.3.2
  flutter_native_splash: ^2.4.7
  upgrader: ^12.5.0
  home_widget: ^0.9.1
  flutter_sound: ^9.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.4
  change_app_package_name: ^1.5.0



# --- НАСТРОЙКИ ГЕНЕРАЦИИ ИКОНОК ---
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

# --- НАСТРОЙКИ НАСТРОЙКИ СИСТЕМНОГО СПЛЭШ-СКРИНА ---
# --- НАСТРОЙКИ СИСТЕМНОГО СПЛЭШ-СКРИНА ---
flutter_native_splash:
  color: "#140F07" # Просто сплошной темный фон! Никаких картинок.
  fullscreen: false
  android_12:
    color: "#140F07"
  ios: true
  android: true

# --- НАСТРОЙКИ FLUTTER И ПУТИ К ФАЙЛАМ ---
flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icon/
    - assets/images/
